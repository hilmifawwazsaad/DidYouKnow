name: "Daily Did You Know Generator"

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai python-dotenv

      - name: Generate Did You Know content
        env:
          SUMOPOD_API_KEY: ${{ secrets.SUMOPOD_API_KEY }}
          SUMOPOD_API_URL: ${{ secrets.SUMOPOD_API_URL }}
          SUMOPOD_MODEL: ${{ secrets.SUMOPOD_MODEL }}
        run: python scripts/generate_content.py

      - name: Update badge count in README
        run: |
          COUNT=$(ls public/data/did-you-know-*.json 2>/dev/null | wc -l)
          sed -i "s/fakta_dibuat-[0-9]*/fakta_dibuat-$COUNT/" README.md

      - name: Commit and push new file
        run: |
          git config --local user.name "BOMZ[bot]"
          git config --local user.email "hilmifawwazsaad@users.noreply.github.com"
          git add public/data/ README.md
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "feat: add Did You Know for $(date +%Y-%m-%d)"
          git push
